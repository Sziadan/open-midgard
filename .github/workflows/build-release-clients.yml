name: Build Release Clients

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Win32
            asset_name: open-midgard-win32
            configure_preset: vs2022-win32
            build_preset: build-release
            output_dir: build/Release
          - label: x64
            asset_name: open-midgard-x64
            configure_preset: vs2022-x64
            build_preset: build-release-x64
            output_dir: build64/Release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure ${{ matrix.label }}
        shell: pwsh
        run: cmake --preset ${{ matrix.configure_preset }} -DRO_ENABLE_DEV_DEPLOY=OFF

      - name: Build ${{ matrix.label }} release
        shell: pwsh
        run: cmake --build --preset ${{ matrix.build_preset }}

      - name: Package ${{ matrix.label }} release
        shell: pwsh
        run: |
          $stagingDir = Join-Path $env:RUNNER_TEMP "${{ matrix.asset_name }}"
          $zipPath = Join-Path $env:RUNNER_TEMP "${{ matrix.asset_name }}.zip"

          if (Test-Path $stagingDir) {
            Remove-Item $stagingDir -Recurse -Force
          }
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          New-Item -ItemType Directory -Path $stagingDir | Out-Null
          Copy-Item "${{ matrix.output_dir }}/open-midgard.exe" $stagingDir

          Compress-Archive -Path "$stagingDir/*" -DestinationPath $zipPath

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ runner.temp }}/${{ matrix.asset_name }}.zip
          if-no-files-found: error

  attach-to-release:
    name: Attach release assets
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Upload assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/open-midgard-win32/open-midgard-win32.zip
            release-assets/open-midgard-x64/open-midgard-x64.zip
